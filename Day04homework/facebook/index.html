<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Facebook Login</title>

<style>

body{
    font-family: Arial;
    background:#e6e6e6;
}

.fb-box{
    width:600px;
    margin:80px auto;
    background:#3b5998;
    padding:15px;
}

.logo{
    text-align:center;
    color:white;
    font-size:40px;
    font-weight:bold;
}

.line{
    height:3px;
    background:red;
    margin:5px 0 15px 0;
}

.form{
    display:flex;
    align-items:center;
    gap:10px;
}

label{
    color:white;
    font-size:12px;
}

input{
    padding:5px;
}

button{
    padding:6px 10px;
    background:#5b74a8;
    color:white;
    border:none;
}

.bottom{
    margin-top:8px;
    color:white;
    font-size:12px;
}

.bottom a{
    color:#dfe3ee;
    text-decoration:none;
    margin-left:20px;
}

</style>

</head>

<body>

<div class="fb-box">

<div class="logo">facebook</div>
<div class="line"></div>

<div class="form">

<div>
<label>Email hoặc điện thoại</label><br>
<input type="text">
</div>

<div>
<label>Mật khẩu</label><br>
<input type="password">
</div>

<div>
<br>
<button>Đăng nhập</button>
<a href="register.html">
<button style="background:#42b72a;">Đăng ký</button>
</a>
</div>

</div>

<div class="bottom">
<input type="checkbox"> Duy trì đăng nhập
<a href="#">Quên mật khẩu?</a>
</div>

</div>

</body>
</html>
