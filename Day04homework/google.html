<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng nhập</title>

<style>

body{
    font-family: Arial;
    background:#f2f2f2;
    text-align:center;
}

.container{
    width:350px;
    background:white;
    margin:80px auto;
    padding:30px;
    border:1px solid #ddd;
    border-radius:5px;
}

.logo{
    font-size:40px;
    color:#4285f4;
    margin-bottom:10px;
}

.subtitle{
    margin-bottom:20px;
    color:#555;
}

.avatar{
    width:100px;
    height:100px;
    background:#ddd;
    border-radius:50%;
    margin:0 auto 20px;
}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:10px;
    background:#4285f4;
    color:white;
    border:none;
    margin-top:10px;
    font-size:16px;
}

a{
    color:#4285f4;
    text-decoration:none;
    font-size:14px;
}

</style>
</head>

<body>

<div class="logo">Google</div>

<div class="subtitle">Đăng nhập để thêm tài khoản khác</div>

<div class="container">

<div class="avatar"></div>

<input type="text" placeholder="Email">
<input type="password" placeholder="Mật khẩu">

<button>Đăng nhập</button>

<br><br>

<a href="#">Bạn cần trợ giúp?</a>

</div>

<br>

<a href="#">Tạo một tài khoản</a>

</body>
</html>
