<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng Ký Thành Viên</title>
<a href="index.html">Quay lại danh sách</a>

<style>

body{
    font-family: Arial;
}

table{
    margin:auto;
}

h2{
    text-align:center;
}

td{
    padding:6px;
}

input[type=text],
input[type=password],
input[type=email],
select{
    width:250px;
    height:25px;
}

textarea{
    width:400px;
    height:120px;
}

</style>

</head>

<body>

<h2>Đăng Ký Thành Viên</h2>

<form>

<table>

<tr>
<td>Họ và Tên</td>
<td><input type="text"></td>
</tr>

<tr>
<td>Tên đăng nhập</td>
<td><input type="text"></td>
</tr>

<tr>
<td>Mật khẩu</td>
<td><input type="password"></td>
</tr>

<tr>
<td>Ảnh đại diện</td>
<td><input type="file"></td>
</tr>

<tr>
<td>Thư điện tử</td>
<td><input type="email"></td>
</tr>

<tr>
<td>Giới tính</td>
<td>
<input type="radio" name="gioitinh"> Nam
<input type="radio" name="gioitinh"> Nữ
</td>
</tr>

<tr>
<td>Sở thích</td>
<td>
<input type="checkbox"> Bóng đá
<input type="checkbox"> Xem phim <br>

<input type="checkbox"> Du lịch
<input type="checkbox"> Bơi
<input type="checkbox"> Nghe nhạc
</td>
</tr>

<tr>
<td>Quê quán</td>
<td>
<select>
<option>---Chọn Tỉnh---</option>
<option>Hà Nội</option>
<option>Hải Phòng</option>
<option>Đà Nẵng</option>
<option>TP Hồ Chí Minh</option>
</select>
</td>
</tr>

<tr>
<td>Địa chỉ</td>
<td><input type="text"></td>
</tr>

<tr>
<td>Điện thoại</td>
<td><input type="text"></td>
</tr>

<tr>
<td>Mô tả ngắn</td>
<td><textarea></textarea></td>
</tr>

<tr>
<td></td>
<td>
<input type="submit" value="Đăng Ký">
<input type="reset" value="Làm Lại">
</td>
</tr>

</table>

</form>

</body>
</html>
