<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch Vụ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #fff;
            padding: 40px;
            width: 90%;
            max-width: 1100px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .title-section {
            margin-bottom: 30px;
        }

        .title-section h2 {
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 24px;
            position: relative;
            display: inline-block;
            padding-bottom: 10px;
        }

        .title-section h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 3px;
            background-color: #27ae60;
        }

        .services-grid {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .service-card {
            flex: 1;
            min-width: 300px;
            height: 350px;
            position: relative;
            border-radius: 8px;
            overflow: hidden; 
            color: white;
            cursor: pointer;
        }

        .card-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            transition: transform 0.5s ease; 
            will-change: transform; 
        }

        .service-card:hover .card-bg {
            transform: scale(1.1); 
        }
