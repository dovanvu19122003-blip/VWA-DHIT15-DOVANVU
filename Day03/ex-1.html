<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Các điều khiển</title>

<style>
body{
    font-family: Arial;
}

.container{
    width: 500px;
}

input, select, textarea{
    margin-bottom: 8px;
}

textarea{
    width: 100%;
    height: 80px;
}

.color-box{
    width:40px;
    height:20px;
}
</style>

</head>

<body>

<h2>Các điều khiển</h2>

<div class="container">

<form>

<label>Username:</label>
<input type="text" placeholder="Nhập tên đăng nhập của bạn">
<br>

<label>Email:</label>
<input type="email" placeholder="Nhập email của bạn">
<br>

<label>Ngày sinh:</label>
<input type="date">
<br>

<label>Màu yêu thích:</label>
<input type="color" value="#ff0000">
<br>

<label>Giới tính:</label>
<input type="radio" name="gender"> Nam
<input type="radio" name="gender"> Nữ
<input type="radio" name="gender"> Khác
<br>

<label>Sở thích:</label>
<input type="checkbox"> Thể thao
<input type="checkbox" checked> Âm nhạc
<input type="checkbox"> Du lịch
<input type="checkbox" checked> Mua sắm
<br>

<label>Chọn tỉnh thành:</label>
<select>
<option>-- Chọn tỉnh thành --</option>
<option>Hà Nội</option>
<option>TP Hồ Chí Minh</option>
<option>Đà Nẵng</option>
<option>Hải Phòng</option>
</select>

<br>

<label>Địa chỉ:</label><br>
<textarea placeholder="Nhập địa chỉ của bạn"></textarea>

<br>

<input type="submit" value="Submit">

</form>

</div>

</body>
</html>
