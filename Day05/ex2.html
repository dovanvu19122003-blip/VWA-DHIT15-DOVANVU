<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lab03 Ex2</title>
<style>
  .box {
    width: 250px;
    height: 250px;
    background-color: #99ff00; /* xanh lá */
    position: relative; /* để định vị badge */
  }

  .badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background-color: red;
    color: white;
    padding: 8px 10px;
    border-radius: 50%;
    font-size: 14px;
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="box">
  <div class="badge">NEW</div>
</div>

</body>
</html>
