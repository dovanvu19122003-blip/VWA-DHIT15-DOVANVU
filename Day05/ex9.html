<!DOCTYPE html>

<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Menu Dropdown</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
    }

    /* MENU CHÍNH */
    .menu {
        background: linear-gradient(#444, #222);
    }

    .menu ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
    }

    .menu ul li {
        position: relative; /* QUAN TRỌNG */
    }

    .menu ul li a {
        display: block;
        padding: 15px 20px;
        color: white;
        text-decoration: none;
    }

    .menu ul li a:hover {
        background: #333;
    }

    /* MENU CON */
    .submenu {
        display: none; /* ẨN BAN ĐẦU */
        position: absolute;
        top: 100%;
        left: 0;
        background: #222;
        min-width: 180px;
    }

    .submenu li a {
        padding: 12px;
        border-bottom: 1px solid #333;
    }

    .submenu li a:hover {
        background: #444;
        color: lightgreen;
    }

    /* HIỆN KHI HOVER */
    .menu ul li:hover .submenu {
        display: block;
    }
</style>

</head>
<body>

    <nav class="menu">
        <ul>
            <li><a href="#">Trang chủ</a></li>
    
    ```
        <li>
            <a href="#">Sản phẩm</a>
            <ul class="submenu">
                <li><a href="#">CSS3</a></li>
                <li><a href="#">HTML5</a></li>
                <li><a href="#">PHP</a></li>
            </ul>
        </li>
    
        <li><a href="#">Dịch vụ</a></li>
        <li><a href="#">Giới thiệu</a></li>
        <li><a href="#">Liên hệ</a></li>
    </ul>
    ```
    
    </nav>
    


</nav>

</body>
</html>
