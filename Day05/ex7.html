<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
    }

    .menu {
        background-color: #111;
        padding: 15px 0;
        text-align: center;
    }

    .menu ul {
        list-style: none;
        margin: 0;
        padding: 0;
    }

    .menu ul li {
        display: inline-block;
        margin: 0 10px;
    }

    .menu ul li a {
        text-decoration: none;
        color: white;
        padding: 10px 18px;
        border-radius: 8px;
        transition: 0.3s;
    }

    .menu ul li a:hover {
        background-color: gold;
        color: black;
    }
</style>
