<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Overlay nâng cao</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center; /* ngang */
    align-items: center;     /* dọc */
    background: #f0f0f0;
    font-family: Arial;
  }

  .container {
    position: relative;
    width: 500px;
    border-radius: 15px;
    overflow: hidden;
    cursor: pointer;
  }

  .container img {
    width: 100%;
    display: block;
    transition: transform 0.4s ease;
  }

  /* overlay */
  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(0, 0, 0, 0.5);
    color: white;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    opacity: 0; /* ẩn ban đầu */
    transition: 0.4s ease;
    text-align: center;
    padding: 20px;
  }

  /* hover effect */
  .container:hover img {
    transform: scale(1.1);
  }

  .container:hover .overlay {
    opacity: 1;
  }

  .overlay button {
    margin-top: 10px;
    padding: 10px 20px;
    border: 1px solid white;
    background: transparent;
    color: white;
    border-radius: 8px;
    cursor: pointer;
  }

  .overlay button:hover {
    background: white;
    color: black;
  }
</style>
</head>
<body>

<div class="container">
  <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">

  <div class="overlay">
    <h2>Du lịch Đà Nẵng</h2>
    <p>Biển xanh – nắng vàng – trải nghiệm tuyệt vời</p>
    <button>Xem thêm</button>
  </div>
</div>

</body>
</html>
