<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lab03 Ex3</title>
<style>
  body {
    font-family: Arial;
  }

  /* Menu chính */
  .menu {
    background: #333;
    display: inline-block;
  }

  .menu ul {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .menu > ul > li {
    display: inline-block;
    position: relative; /* mốc cho dropdown */
  }

  .menu a {
    display: block;
    padding: 12px 20px;
    color: white;
    text-decoration: none;
  }

  .menu a:hover {
    background: #555;
  }

  /* Dropdown */
  .submenu {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    background: #f2f2f2;
    min-width: 150px;
  }

  .submenu li {
    display: block;
  }

  .submenu a {
    color: black;
  }

  .submenu a:hover {
    background: #ddd;
  }

  /* Hiện dropdown khi hover */
  .menu li:hover .submenu {
    display: block;
  }
</style>
</head>
<body>


<div class="menu">
  <ul>
    <li><a href="#">Trang chủ</a></li>

    <li>
      <a href="#">Sản phẩm</a>
      <ul class="submenu">
        <li><a href="#">Laptop</a></li>
        <li><a href="#">Điện thoại</a></li>
        <li><a href="#">Phụ kiện</a></li>
      </ul>
    </li>

    <li><a href="#">Liên hệ</a></li>
  </ul>
</div>

</body>
</html>
