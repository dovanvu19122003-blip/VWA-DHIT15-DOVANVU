<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Product Card</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f2f2f2;
    font-family: Arial;
  }

  .card {
    width: 260px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    padding: 15px;
    position: relative; /* mốc cho SALE */
    text-align: left;
  }

  .card img {
    width: 100%;
    border-radius: 8px;
  }

  .card h3 {
    margin: 10px 0 5px;
    font-size: 16px;
  }

  .price {
    color: red;
    font-weight: bold;
  }

  /* Badge SALE */
  .sale {
    position: absolute;
    top: 10px;
    right: 10px;
    background: red;
    color: white;
    padding: 5px 10px;
    font-size: 12px;
    border-radius: 6px;
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="card">
  <div class="sale">SALE</div>

  <img src="https://pngimg.com/uploads/tshirt/tshirt_PNG5454.png" alt="Áo">

  <h3>Áo Thun Cổ Trụ</h3>
  <div class="price">250.000đ</div>
</div>

</body>
</html>
